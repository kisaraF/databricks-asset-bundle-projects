# This is a Databricks asset bundle definition for sql_alert_dab.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: sql_alert_dab
  uuid: 4bb31921-fbe4-413b-adc1-6475d20ffe99

include:
  - resources/*.yml
  - resources/*.yaml
  - resources/*/*.yml


targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-df62706d-9c0d.cloud.databricks.com
    variables:
      catalog: sandbox_catalog
      schema: ${workspace.current_user.short_name}
  prod:
    mode: production
    workspace:
      host: https://dbc-df62706d-9c0d.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/kisaraf.superloop@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/kisaraf.superloop@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: sandbox_catalog
      schema: prod
    permissions:
      - user_name: kisaraf.superloop@gmail.com
        level: CAN_MANAGE
