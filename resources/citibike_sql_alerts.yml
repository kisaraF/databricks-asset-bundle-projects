resources:
  alerts:
    citibike_sql_alert:
      display_name: citibike_sql_alert
      custom_description: This triggers if the daily total trip count is less than 25
      evaluation:
        comparison_operator: GREATER_THAN
        # notification:
        #   subscriptions:
        #     user_email: kisaraf.superloop@gmail.com 
        source:
          aggregation: COUNT
          name: ttl_trips
        threshold:
          value:
            double_value: 0.0
      permissions:
        - level: CAN_RUN
          user_name: kisaraf.superloop@gmail.com
        - level: CAN_MANAGE
          user_name: kisaraf.superloop@gmail.com
      query_text: |
      SELECT trip_start_date, SUM(total_trips) ttl_trips
      FROM ${var.catalog}.03_gold.daily_ride_summary
      GROUP BY trip_start_date
      HAVING SUM(total_trips) < 25
      schedule:
        pause_status: UNPAUSED
        quartz_cron_schedule: '59 * * * * ?'
        timezone_id: Australia/Sydney
      warehouse_id: ceb3be95f4dc9e20
