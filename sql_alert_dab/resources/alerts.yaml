resources:
  alerts:
    undefined_days_alert:
      display_name: "Undefined Days Monitoring Alert"
      
      # Ensure this variable is defined in variables.yaml and loads the .sql file
      query_text: ${file(../src/queries/undefined_days_alert.sql)}
      
      # Reference the warehouse ID variable
      warehouse_id: ${var.sql_warehouse_id}
      
      evaluation:
        # These are REQUIRED fields
        comparison_operator: GREATER_THAN
        source:
          name: "cnt"  # This MUST match the column name in your SQL output
        threshold:
          value:
            double_value: 0
        
        notification:
          notify_on_ok: true
          subscriptions:
            - user_email: "kisaraf.superloop@gmail.com"

      schedule:
        # This is REQUIRED
        quartz_cron_schedule: "0 30 20 * * ?" # Every day at 08:30 PM
        timezone_id: "Australia/Sydney"
        pause_status: "UNPAUSED"
